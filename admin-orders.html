<!doctype html>
<html>
  <head>
    <title>All Orders - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      .dashboard-container {
        max-width: 1400px;
        margin: 40px auto;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
    <div class="dashboard-container">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
        <h2 style="color: #11998e;">📦 All Customer Orders</h2>
        <div>
          <a href="seller.html" style="color: #11998e; text-decoration: none; font-weight: 600;">← Back to Dashboard</a>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3 id="totalOrders">0</h3>
          <p>Total Orders</p>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
          <h3 id="totalRevenue">₹0</h3>
          <p>Total Revenue</p>
        </div>
      </div>

      <div class="filter-section">
        <input type="text" id="searchInput" placeholder="Search by customer name, phone, or order ID">
        <button onclick="filterOrders()">Search</button>
        <button onclick="clearFilter()" style="background: #6c757d;">Clear</button>
      </div>

      <div id="orders"></div>
    </div>

    <script src="config.js"></script>
    <script src="admin-orders.js"></script>
  </body>
</html>
