<!doctype html>
<html>
  <head>
    <title>Products</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
    <link rel="stylesheet" href="styles.css" id="pageStyle" />
  </head>
  <body>
    <script>
      // Load saved theme immediately
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.getElementById('pageStyle').setAttribute('href', savedTheme);
        }
      })();
    </script>
    <div class="header">
      <div class="header-top">
        <div class="header-brand">
          <h1><a href="index.html">🛍️ Store</a></h1>
        </div>
        
        <div class="header-search">
          <input 
            type="text" 
            id="searchInput" 
            placeholder="🔍 Search products..." 
            onkeyup="filterProducts(this.value)"
          />
        </div>
        
        <div class="header-actions">
          <div class="coin-badge">
            💰 <span id="userCoins">0</span> Coins
          </div>
          <button class="theme-toggle" onclick="swapStyleSheet()">Girl theme</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>
      
      <div class="header-nav">
        <a href="index.html"> Home</a>
        <a href="game.html"> Play Game</a>
        <a href="cart.html"> Cart</a>
        <a href="wishlist.html"> Wishlist</a>
        <a href="orders.html">Orders</a>
        <a href="seller-login.html"> Seller</a>
      </div>
      
      <div>
        <h2 id="welcome" align="center"></h2>
      </div>
    </div>

    <div class="container">
      <div class="sidebar">
        <h3>Categories</h3>
        <ul id="categories">
          <li class="active" onclick="filterByCategory('all')">All Products</li>
        </ul>
      </div>

      <div class="main-content">
        <div class="products" id="products"></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
