<!doctype html>
<html>
  <head>
    <title>Cart</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete"
    /><style>
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 20
}
</style>
    <link rel="stylesheet" href="styles.css" id="pageStyle" />
  </head>
  <body>
    <script>
      // Load saved theme immediately
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.getElementById('pageStyle').setAttribute('href', savedTheme);
        }
      })();
    </script>
    <div class="header">
      <div>
        <h1><a href="index.html">🛍️ Store </a></h1>
        <a href="game.html"> Play Game</a>
        <a href="orders.html"> Orders</a>
        <a href="seller-login.html"> Seller</a>
        <a href="cart.html"> Cart</a>
        <a href="wishlist.html"> Wishlist</a>
        <a href="client.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <div class="coin-display">
          <div class="coin-badge">
            💰 <span id="userCoins">0</span> Coins
          </div>
        </div>
        <button onclick="logout()">Logout</button>
      </div>
      <div>
        <h2 id="welcome" align="center"></h2>
      </div>
    </div>
    <div class="page-container">
      <h2>🛒 My Cart</h2>

      <div id="cart"></div>
      <h3 id="total" class="cart-total"></h3>

      <div class="cart-actions">
        <button onclick="clearCart()" class="btn-clear-cart">
          Clear Cart
        </button>
        <button onclick="window.location.href = 'checkout.html'" class="btn-checkout">
          Proceed to Checkout
        </button>
      </div>

      <br />
      <a href="index.html" class="back-link">← Continue Shopping</a>
    </div>
    <script src="theme.js"></script>
    <script src="cart.js"></script>
  </body>
</html>
